plugins {
    id "com.android.application"
}

android {
    namespace "com.booknook.converted"
    compileSdk 36

    defaultConfig {
        applicationId "com.booknook.converted"
        minSdk 23
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation "com.tom-roush:pdfbox-android:2.0.27.0"
}
