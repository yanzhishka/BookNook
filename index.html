
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B.Nook | Divine Reading</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23f59e0b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20'/%3E%3Cpath d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z'/%3E%3Ctext x='9' y='15' fill='%23f59e0b' font-family='serif' font-weight='900' font-size='10' stroke='none'%3EB%3C/text%3E%3C/svg%3E" />
    <meta name="theme-color" content="#0c0a09" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300&family=Inter:wght@100;300;400;500;600;700;800;900&display=swap');
      
      html {
        font-size: 15px;
      }

      body {
        font-family: 'Inter', sans-serif;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        cursor: none !important;
      }
      h1, h2, h3, h4, .serif {
        font-family: 'Merriweather', serif;
        letter-spacing: -0.03em;
      }

      .aurora-container {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: -1;
        overflow: hidden;
        background: #fcfaf7;
        pointer-events: none;
      }
      .dark .aurora-container { background: #0c0a09; }

      .aurora-blob {
        position: absolute;
        width: 70vw;
        height: 70vw;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.2;
        animation: aurora 25s infinite alternate ease-in-out;
      }
      .dark .aurora-blob { opacity: 0.12; }

      .aurora-1 { top: -20%; left: -10%; background: radial-gradient(circle, #f59e0b 0%, transparent 70%); }
      .aurora-2 { bottom: -20%; right: -10%; background: radial-gradient(circle, #ec4899 0%, transparent 70%); animation-delay: -7s; }
      .aurora-3 { top: 30%; right: 15%; background: radial-gradient(circle, #3b82f6 0%, transparent 70%); animation-delay: -12s; }

      .noise-overlay::before {
        content: "";
        position: fixed;
        top: -150%; left: -150%; width: 400%; height: 400%;
        background-image: url("https://grainy-gradients.vercel.app/noise.svg");
        opacity: 0.05;
        pointer-events: none;
        z-index: 9999;
        animation: grain 8s steps(10) infinite;
      }
      .dark .noise-overlay::before { opacity: 0.09; }

      .glass {
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(24px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.2);
      }
      .dark .glass {
        background: rgba(12, 10, 9, 0.45);
        backdrop-filter: blur(24px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.04);
      }

      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(0,0,0,0.08);
        border-radius: 10px;
      }
      .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }

      @keyframes reveal {
        from { opacity: 0; transform: translateY(30px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      .reveal {
        animation: reveal 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .hover-lift {
        transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .hover-lift:hover {
        transform: translateY(-12px) scale(1.02);
        box-shadow: 0 30px 60px -15px rgba(0,0,0,0.12);
      }
      .dark .hover-lift:hover {
        box-shadow: 0 30px 60px -15px rgba(0,0,0,0.5);
      }
      
      * {
        transition: background-color 0.3s ease, border-color 0.3s ease, color 0.15s ease;
      }

      @media (max-width: 640px) {
        html {
          font-size: 14.5px;
        }
      }
    </style>
</head>
  <body class="noise-overlay bg-[#fcfaf7] text-stone-900 dark:bg-stone-950 dark:text-stone-100 antialiased selection:bg-amber-500/20">
    <div class="aurora-container">
      <div class="aurora-blob aurora-1"></div>
      <div class="aurora-blob aurora-2"></div>
      <div class="aurora-blob aurora-3"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="index.tsx"></script>
  </body>
</html>
